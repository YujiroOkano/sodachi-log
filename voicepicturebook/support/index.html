<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>こえずかん サポート</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; line-height: 1.8; margin: 0; color: #2f261f; background: #f5fbff; }
    main { max-width: 860px; margin: 0 auto; padding: 48px 20px 72px; }
    h1 { font-size: clamp(2rem, 7vw, 3.5rem); line-height: 1.2; margin: 0 0 16px; color: #276fbf; }
    h2 { margin-top: 32px; color: #f05a4f; }
    a { color: #0b68b7; }
    .card { background: #fff; border: 1px solid #dceefa; border-radius: 16px; padding: 24px; box-shadow: 0 12px 28px rgba(20, 74, 120, 0.08); }
  </style>
</head>
<body>
<main>
  <h1>こえずかん サポート</h1>
  <div class="card">
    <p>「こえずかん」は、幼児が日本語と英語のものの名前を聞いて、まねして、子どもの声を録音できるアプリです。</p>
    <h2>よくある確認</h2>
    <p>録音ができない場合は、iOSの設定アプリで「こえずかん」のマイク許可が有効になっているか確認してください。</p>
    <p>サブスクリプションの管理や解約は、App Storeのアカウント設定から行えます。</p>
    <p>録音データや学習記録は端末内に保存されます。端末変更やアプリ削除の前に、必要なデータをご確認ください。</p>
    <h2>お問い合わせ</h2>
    <p>不具合やご要望は、<a href="https://github.com/YujiroOkano/sodachi-log/issues">GitHub Issues</a> からお知らせください。個人のメールアドレスは公開していません。</p>
    <p><a href="https://yujirookano.github.io/sodachi-log/voicepicturebook/privacy-policy/">プライバシーポリシー</a></p>
  </div>
</main>
</body>
</html>
